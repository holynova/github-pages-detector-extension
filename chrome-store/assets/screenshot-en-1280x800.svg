<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <rect width="1280" height="800" fill="#ffffff"/>
  <rect x="0" y="0" width="1280" height="96" fill="#f6f8fa"/>
  <text x="80" y="62" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#24292f">GitHub Pages Detector</text>
  <text x="80" y="158" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="48" font-weight="800" fill="#24292f">Find GitHub Pages instantly</text>
  <text x="80" y="208" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" fill="#57606a">Inline status for GitHub repositories.</text>
  <text x="80" y="242" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" fill="#57606a">Open or copy the detected Pages URL with one click.</text>
  <rect x="80" y="298" width="1120" height="300" rx="18" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="120" y="362" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700" fill="#57606a">github.com / holynova / github-pages-detector-extension</text>
  <rect x="120" y="406" width="300" height="62" rx="12" fill="#eff6ff" stroke="#c8d7e6" stroke-width="2"/>
  <circle cx="154" cy="437" r="10" fill="#2da44e"/>
  <text x="180" y="446" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#24292f">GitHub Pages</text>
  <rect x="436" y="406" width="90" height="62" rx="12" fill="#ffffff" stroke="#c8d7e6" stroke-width="2"/>
  <text x="460" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#57606a">Copy</text>
  <text x="120" y="526" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" fill="#57606a">Open the Pages site or copy its URL</text>
  <text x="120" y="560" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" fill="#57606a">without leaving the repository page.</text>
  <rect x="720" y="352" width="360" height="180" rx="16" fill="#ffffff" stroke="#d0d7de"/>
  <text x="760" y="408" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#24292f">Detects Pages</text>
  <text x="760" y="452" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" fill="#57606a">API first, URL fallback</text>
  <text x="760" y="490" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" fill="#57606a">Public and private repos</text>
  <rect x="80" y="650" width="1120" height="1" fill="#d0d7de"/>
  <text x="80" y="705" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="20" fill="#57606a">Compact state:</text>
  
  <text x="300" y="716" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#24292f">Public</text>
  <rect x="420" y="674" width="238" height="56" rx="10" fill="#f6f8fa" stroke="#c8d7e6" stroke-width="2"/>
  <circle cx="454" cy="702" r="8" fill="#2da44e"/>
  <text x="478" y="711" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="25" font-weight="700" fill="#24292f">GitHub Pages</text>
  <rect x="670" y="674" width="64" height="56" rx="10" fill="#f6f8fa" stroke="#c8d7e6" stroke-width="2"/>
  <text x="686" y="710" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#57606a">Copy</text>
